name: 'NRF Connect SDK CI action'
description: 'Building nrf connect sdk projects'
branding:
  color: blue
  icon: Link
inputs:
  board:  # id of input
    description: 'Board for build'
    required: true
  build_dir:
    description: 'Building directory'
    required: true
    default: 'build'
  add_flags:
    description: 'Additional flags'
    required: true
    default: '--no-sysbuild'
  board_root:
    description: 'Path to the root directory containing a boards/ sub-directory with custom board definitions (e.g. the workspace root when boards live under boards/<vendor>/<board>). Leave empty to use only the SDK built-in boards.'
    required: false
    default: ''
runs:
  using: 'docker'
  image: 'docker://ghcr.io/hall-lab-umd/nrf-connect-sdk-ci:v3.2.1'
    
